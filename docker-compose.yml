version: '3.8'  
services:  
  backend:  
    image: adibariya/carmula-backend:latest  
    build:  
      context: ./backend  
      dockerfile: Dockerfile  
    environment:  
      - FLASK_ENV=production  
      - DATABASE_URL=postgresql://user:password@db:5432/carmula  
    ports:  
      - '5000:5000'  
    networks:  
      - carmula-network  
    depends_on:  
      - db  
  
  frontend:  
    image: adibariya/carmula-frontend:latest  
    build:  
      context: ./frontend  
      dockerfile: Dockerfile  
    ports:  
      - '80:80'  
    networks:  
      - carmula-network  
  
  socket:  
    image: adibariya/carmula-socket:latest  
    build:  
      context: ./socket  
      dockerfile: Dockerfile  
    ports:  
      - '3000:3000'  
    networks:  
      - carmula-network  
    depends_on:  
      - backend  
  
  db:  
    image: postgres:13  
    environment:  
      - POSTGRES_DB=carmula  
      - POSTGRES_USER=user  
      - POSTGRES_PASSWORD=password  
    volumes:  
      - db_data:/var/lib/postgresql/data  
    networks:  
      - carmula-network  
    healthcheck:  
      test: ['CMD-SHELL', 'pg_isready -U user']  
      interval: 30s  
      timeout: 5s  
      retries: 3  
  
  redis:  
    image: redis:alpine  
    volumes:  
      - redis_data:/data  
    networks:  
      - carmula-network  
    healthcheck:  
      test: ['CMD', 'redis-cli', 'ping']  
      interval: 30s  
      timeout: 5s  
      retries: 3  
  
networks:  
  carmula-network:  
    driver: bridge  

volumes:  
  db_data:  
  redis_data:  
